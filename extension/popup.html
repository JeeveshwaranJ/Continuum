<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 12px;
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #080809;
      color: #ededf0;
      font-size: 11px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-b: 1px solid #1c1c1f;
      padding-bottom: 6px;
    }
    .logo-char {
      color: #00ff66;
      font-weight: bold;
      font-size: 13px;
    }
    .title {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-card {
      width: 100%;
      background: #111113;
      border: 1px solid #2c2c2f;
      padding: 10px;
      box-sizing: border-box;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .label {
      color: #7e7e84;
      font-size: 9px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 10px;
    }
    .indicator {
      display: inline-block;
      font-size: 10px;
      font-weight: bold;
      line-height: 1;
    }
    .indicator::before {
      content: "■";
    }
    .indicator.connected {
      color: #00ff66;
    }
    .indicator.disconnected {
      color: #ef4444;
    }
    .footer {
      font-size: 9px;
      color: #7e7e84;
      text-align: center;
      line-height: 1.3;
      text-transform: uppercase;
      border-top: 1px dashed #2c2c2f;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo-char">■</span>
      <div class="title">Continuum // Sync</div>
    </div>
    
    <div class="status-card">
      <div class="status-item">
        <span class="label">IPC Connection Status</span>
        <div class="value">
          <span id="statusIndicator" class="indicator disconnected"></span>
          <span id="statusText">Disconnected</span>
        </div>
      </div>
    </div>

    <div class="footer">
      [ active_browser_tabs_syncing ]
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
